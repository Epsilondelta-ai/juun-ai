name: Extension Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-extension:
    name: Build pi footer extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.event.pull_request.head.sha || github.sha }}
          git checkout FETCH_HEAD

      - name: Setup Bun
        run: npm install -g bun

      - name: Build footer extension
        run: bun build .pi/extensions/footer.ts --outdir /tmp/pi-extension-check --target node
