name: Extension Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-extension:
    name: Build pi footer extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Bun
        run: npm install -g bun

      - name: Build footer extension
        run: bun build .pi/extensions/footer.ts --outdir /tmp/pi-extension-check --target node
